name: Build Alsager Add-on

on:
  push:
    branches: [main]
    paths:
      - "alsager/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: armv7
            platform: linux/arm/v7
          - arch: aarch64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # Publish packages as PUBLIC so Home Assistant can pull them
          # without GHCR credentials (HA only has the image reference).
          make-public: true

      - name: Derive image tags
        id: tags
        run: |
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO_LOWER}/alsager-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            # Use the add-on version from config.json so HA (which pulls
            # ghcr.io/.../alsager-{arch}:<config.version>) finds the image.
            VERSION=$(grep -m1 '"version"' alsager/config.json | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./alsager
          file: ./alsager/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version }}
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Built ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version }}"
